version: "3.9"

services:
  email-triage-env:
    build: .
    image: email-triage-env:latest
    ports:
      - "7860:7860"
    environment:
      - PORT=7860
      # Set these for running inference inside container
      # - API_BASE_URL=https://api.openai.com/v1
      # - MODEL_NAME=gpt-4o-mini
      # - HF_TOKEN=your_token_here
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
